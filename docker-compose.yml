version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: realworld_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: realworld
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: realworld_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: realworld_mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: realworld_api
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_ADDR: redis:6379
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_FROM: noreply@realworld.dev
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
